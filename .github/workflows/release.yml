name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    name: Publish to RubyGems
    environment: release
    # rubygems/release-gem still nests a Node 20 action (actions/checkout@v4);
    # opt into Node 24 now (forced by GitHub from 2026-06-16) to clear the
    # deprecation warning.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - name: Run tests
        run: bundle exec rake test_all
      - name: Release gem
        uses: rubygems/release-gem@v1
