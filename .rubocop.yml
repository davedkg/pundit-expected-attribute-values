# Merge our AllCops/Exclude with RuboCop's defaults (vendor/**/*, etc.) instead
# of replacing them — otherwise CI's vendor/bundle gets scanned.
inherit_mode:
  merge:
    - Exclude

AllCops:
  TargetRubyVersion: 3.3
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    # The example app is self-contained (its own bundle/style); not linted here.
    - "example/**/*"

Style/Documentation:
  Enabled: false

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

Style/MultilineBlockChain:
  Exclude:
    - spec/**/*

Metrics/BlockLength:
  Exclude:
    - spec/**/*
    - test/**/*
    - pundit-expected-attribute-values.gemspec

Metrics/MethodLength:
  Max: 15

Lint/EmptyClass:
  Exclude:
    - spec/**/*
    - test/**/*
